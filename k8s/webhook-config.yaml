apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: pod-security-webhook
webhooks:
- name: podsecurity.webhook.example.com
  admissionReviewVersions: ["v1"]
  sideEffects: None
  failurePolicy: Fail
  clientConfig:
    service:
      name: pod-security-webhook
      namespace: webhook-system
      path: /validate
    caBundle: 

  rules:
  - apiGroups: [""]
    apiVersions: ["v1"]
    operations: ["CREATE"]
    resources: ["pods"]

  namespaceSelector:
    matchLabels:
      webhook: enabled

  objectSelector:
    matchExpressions:
    - key: app
      operator: NotIn
      values:
      - pod-security-webhook