apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pod-security-webhook
rules:
- apiGroups: [""]
  resources: ["persistentvolumeclaims"]
  verbs: ["get"]

- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get"]

- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]