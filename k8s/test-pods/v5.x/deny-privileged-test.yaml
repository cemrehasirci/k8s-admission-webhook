apiVersion: v1
kind: Pod
metadata:
  name: test-privileged-deny
  namespace: test
spec:
  securityContext:
    runAsNonRoot: true
  containers:
  - name: nginx
    image: nginx:1.25
    securityContext:
      privileged: true
      runAsNonRoot: true
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"