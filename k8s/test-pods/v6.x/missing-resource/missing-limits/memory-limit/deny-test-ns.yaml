apiVersion: v1
kind: Pod
metadata:
  name: missing-memory-limit-test
  namespace: test
spec:
  securityContext:
    runAsNonRoot: true

  containers:
    - name: nginx
      image: nginxinc/nginx-unprivileged:1.25

      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false

      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"