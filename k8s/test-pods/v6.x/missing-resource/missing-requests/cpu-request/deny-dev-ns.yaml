apiVersion: v1
kind: Pod
metadata:
  name: missing-cpu-request-dev
  namespace: dev
spec:
  securityContext:
    runAsNonRoot: true

  containers:
    - name: nginx
      image: nginxinc/nginx-unprivileged:1.25

      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false

      resources:
        requests:
          memory: "64Mi"
        limits:
          memory: "128Mi"