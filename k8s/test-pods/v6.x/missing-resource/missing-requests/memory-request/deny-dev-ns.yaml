apiVersion: v1
kind: Pod
metadata:
  name: missing-memory-request-dev
  namespace: dev
spec:
  securityContext:
    runAsNonRoot: true

  containers:
    - name: nginx
      image: nginxinc/nginx-unprivileged:1.25

      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false

      resources:
        requests:
          cpu: "50m"
        limits:
          cpu: "100m"