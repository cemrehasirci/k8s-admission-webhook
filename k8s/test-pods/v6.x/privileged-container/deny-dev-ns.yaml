apiVersion: v1
kind: Pod
metadata:
  name: privileged-dev
  namespace: dev
spec:
  containers:
    - name: nginx
      image: nginxinc/nginx-unprivileged:1.25

      securityContext:
        privileged: true
        runAsNonRoot: true

      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"