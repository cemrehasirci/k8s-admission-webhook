apiVersion: v1
kind: Pod
metadata:
  name: hostpath-dev
  namespace: dev
spec:
  securityContext:
    runAsNonRoot: true

  containers:
    - name: nginx
      image: nginxinc/nginx-unprivileged:1.25

      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false

      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"

      volumeMounts:
        - name: host-etc
          mountPath: /host-etc
          readOnly: true

  volumes:
    - name: host-etc
      hostPath:
        path: /etc
        type: Directory